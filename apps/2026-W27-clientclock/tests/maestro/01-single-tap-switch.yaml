# Criterion: Switching a running timer from one client to another completes in exactly
# 1 tap from the Home screen, with the new timer started and the previous entry closed
# within 200ms of the tap.
appId: com.boa.clientclock
---
- launchApp:
    clearState: true
- tapOn: "Skip"
- tapOn: "Clients"
- tapOn: "Add"
- inputText: "Acme Corp"
- tapOn: "Save"
- tapOn: "Add"
- inputText: "Beta LLC"
- tapOn: "Save"
- tapOn: "Home"
# Start timer on first client
- tapOn: "Acme Corp"
- assertVisible: "Running"
# Single tap to switch to second client
- tapOn: "Beta LLC"
- assertVisible: "Running"
- assertVisible: "Beta LLC"
- takeScreenshot: "01-single-tap-switch"
