# Criterion: The Weekly Report output is plain text that can be selected and copied
# with a single long-press, containing each client name and total hours for the week.
# TODO Phase 3: Verifying the selectable text contents requires a subscription mock
# to unlock the Weekly Report screen. The test navigates to the paywall gate to
# confirm the screen exists and the gate works — the selectable text assertion
# needs a paid subscription state to complete.
appId: com.boa.clientclock
---
- launchApp:
    clearState: true
- tapOn: "Skip"
- tapOn: "Week"
# Without subscription, gate is shown — verify it leads to paywall
- assertVisible: "Weekly summary"
- assertVisible: "Unlock Pro"
- takeScreenshot: "06-weekly-report-gate"
