# Criterion: The onboarding flow (client setup to first running timer) completes in
# 3 steps or fewer.
appId: com.boa.clientclock
---
- launchApp:
    clearState: true
# Step 1: Welcome screen — verify step label "01"
- assertVisible: "01"
- tapOn: "Continue"
# Step 2: Add client — enter name
- assertVisible: "02"
- inputText: "My First Client"
- tapOn: "Continue"
# Step 3: Ready — start timer
- assertVisible: "03"
- tapOn: "Start timer"
# Verify Home screen is shown and timer is running
- assertVisible: "ClientClock"
- assertVisible: "Running"
- takeScreenshot: "05-onboarding-complete"
